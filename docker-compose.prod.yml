
# Production override for docker-compose.yml
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Required environment variables (set in .env or CI/CD secrets):
#   APP_KEY, DB_PASSWORD, MYSQL_ROOT_PASSWORD, PUSHER_APP_KEY, PUSHER_APP_SECRET

services:
  app:
    build:
      args:
        USER_ID: 1000
        GROUP_ID: 1000
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-https://api.yourdomain.jp}
      DB_HOST: mysql
      DB_DATABASE: ${DB_DATABASE:-asahi_route}
      DB_USERNAME: ${DB_USERNAME:-asahi_user}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      PUSHER_APP_ID: ${PUSHER_APP_ID:-asahi-app}
      PUSHER_APP_KEY: ${PUSHER_APP_KEY}
      PUSHER_APP_SECRET: ${PUSHER_APP_SECRET}
      PUSHER_HOST: soketi
      PUSHER_PORT: 6001
      PUSHER_SCHEME: http
      BROADCAST_DRIVER: pusher
      OPTIMIZER_URL: http://optimizer:8000
      FRONTEND_URL: ${FRONTEND_URL:-https://app.yourdomain.jp}
    restart: always
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf
      - ${SSL_CERT_PATH:-./docker/nginx/ssl}:/etc/nginx/ssl:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always

  mysql:
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-asahi_route}
      MYSQL_USER: ${DB_USERNAME:-asahi_user}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    restart: always

  redis:
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: always

  optimizer:
    environment:
      ENVIRONMENT: production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: always

  worker:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      DB_HOST: mysql
      DB_DATABASE: ${DB_DATABASE:-asahi_route}
      DB_USERNAME: ${DB_USERNAME:-asahi_user}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      PUSHER_APP_ID: ${PUSHER_APP_ID:-asahi-app}
      PUSHER_APP_KEY: ${PUSHER_APP_KEY}
      PUSHER_APP_SECRET: ${PUSHER_APP_SECRET}
      PUSHER_HOST: soketi
      PUSHER_PORT: 6001
      PUSHER_SCHEME: http
      BROADCAST_DRIVER: pusher
      OPTIMIZER_URL: http://optimizer:8000
    healthcheck:
      test: ["CMD", "php", "artisan", "queue:monitor", "redis:default"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    restart: always

  soketi:
    environment:
      SOKETI_DEBUG: "0"
      SOKETI_DEFAULT_APP_ID: ${PUSHER_APP_ID:-asahi-app}
      SOKETI_DEFAULT_APP_KEY: ${PUSHER_APP_KEY}
      SOKETI_DEFAULT_APP_SECRET: ${PUSHER_APP_SECRET}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9601/usage"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always
