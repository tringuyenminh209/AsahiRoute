
# Production override for docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Secrets are injected via .env file (generated by CF UserData from SSM).
# DB: Supabase PostgreSQL (external) — no local MySQL service.

services:
  app:
    build:
      args:
        USER_ID: 1000
        GROUP_ID: 1000
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-https://api.todokizamu.me}
      # ── Database: Supabase PostgreSQL ──────────────────────────────────
      DB_CONNECTION: pgsql
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-postgres}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      # ── Redis (internal container) ─────────────────────────────────────
      REDIS_HOST: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      # ── WebSocket / Soketi ─────────────────────────────────────────────
      PUSHER_APP_ID: ${PUSHER_APP_ID:-asahi-app}
      PUSHER_APP_KEY: ${PUSHER_APP_KEY}
      PUSHER_APP_SECRET: ${PUSHER_APP_SECRET}
      PUSHER_HOST: soketi
      PUSHER_PORT: 6001
      PUSHER_SCHEME: http
      BROADCAST_CONNECTION: pusher
      OPTIMIZER_URL: http://optimizer:8000
      FRONTEND_URL: ${FRONTEND_URL:-https://app.todokizamu.me}
    restart: always
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf
      - ${SSL_CERT_PATH:-./docker/nginx/ssl}:/etc/nginx/ssl:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always

  redis:
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: always

  optimizer:
    environment:
      ENVIRONMENT: production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: always

  worker:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      # ── Database: Supabase PostgreSQL ──────────────────────────────────
      DB_CONNECTION: pgsql
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-postgres}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      # ── Redis ──────────────────────────────────────────────────────────
      REDIS_HOST: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      # ── WebSocket / Soketi ─────────────────────────────────────────────
      PUSHER_APP_ID: ${PUSHER_APP_ID:-asahi-app}
      PUSHER_APP_KEY: ${PUSHER_APP_KEY}
      PUSHER_APP_SECRET: ${PUSHER_APP_SECRET}
      PUSHER_HOST: soketi
      PUSHER_PORT: 6001
      PUSHER_SCHEME: http
      BROADCAST_CONNECTION: pusher
      OPTIMIZER_URL: http://optimizer:8000
    healthcheck:
      test: ["CMD", "php", "artisan", "queue:monitor", "redis:default"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    restart: always

  soketi:
    environment:
      SOKETI_DEBUG: "0"
      SOKETI_DEFAULT_APP_ID: ${PUSHER_APP_ID:-asahi-app}
      SOKETI_DEFAULT_APP_KEY: ${PUSHER_APP_KEY}
      SOKETI_DEFAULT_APP_SECRET: ${PUSHER_APP_SECRET}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9601/usage"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always
