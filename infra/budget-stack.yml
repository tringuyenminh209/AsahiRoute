################################################################################
#  AsahiRoute — 超節約プラン CloudFormation Stack
#  Region: ap-northeast-3 (Osaka)
#  Budget: ~$12-14/month (On-Demand) | ~$8.62/month (1yr RI)
#
#  Resources:
#    - VPC + Public Subnet + IGW
#    - EC2 t4g.micro (ARM Graviton2) + EBS gp3 20GB
#    - Elastic IP
#    - Security Group (SSH, HTTP/S, WebSocket)
#    - S3 Buckets (frontend SPA + storage/backup)
#    - CloudFront CDN
#    - IAM Role (EC2 → S3, CloudWatch)
#    - CloudWatch Alarms (CPU, StatusCheck)
#    - Daily EBS Snapshot via EventBridge + DLM
#
#  Deploy:
#    aws cloudformation deploy \
#      --stack-name asahi-budget \
#      --template-file infra/budget-stack.yml \
#      --capabilities CAPABILITY_NAMED_IAM \
#      --parameter-overrides \
#        KeyPairName=your-key \
#        SSHAllowedIP=YOUR_IP/32 \
#        DomainName=yourdomain.jp \
#      --region ap-northeast-3
################################################################################

AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  AsahiRoute Budget Plan — Single EC2 + Docker Compose stack (Supabase DB)
  for small ASA newspaper delivery shop (1-5 deliverers, ~200 subscribers).
  Estimated cost: $12-14/month on ap-northeast-3 (Osaka).

# ═══════════════════════════════════════════════════════════════════════════════
#  Parameters
# ═══════════════════════════════════════════════════════════════════════════════

Parameters:
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 SSH key pair name (must exist in ap-northeast-3)

  SSHAllowedIP:
    Type: String
    Default: "0.0.0.0/0"
    Description: >-
      CIDR for SSH access (strongly recommend your IP only, e.g. 203.0.113.5/32).
      Default 0.0.0.0/0 is INSECURE — change this!
    AllowedPattern: '(\d{1,3}\.){3}\d{1,3}/\d{1,2}'

  DomainName:
    Type: String
    Default: "todokizamu.me"
    Description: Root domain name (e.g. asa-osaka-west.jp)

  InstanceType:
    Type: String
    Default: t4g.micro
    AllowedValues: [t4g.micro, t4g.small, t4g.medium]
    Description: EC2 instance type (t4g.micro = $7.92/mo, t4g.small = $15.84/mo)

  EBSVolumeSize:
    Type: Number
    Default: 20
    MinValue: 10
    MaxValue: 100
    Description: EBS gp3 volume size in GB ($0.077/GB-month in Osaka)

  GitRepoURL:
    Type: String
    Default: "https://github.com/tringuyenminh209/AsahiRoute.git"
    Description: Git repository URL for the application

  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging]

  LatestAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64'
    Description: SSM Parameter for the latest Amazon Linux 2023 ARM64 AMI

# ═══════════════════════════════════════════════════════════════════════════════
#  Resources
# ═══════════════════════════════════════════════════════════════════════════════

Resources:

  # ─────────────────────────────────────────────────────────────────────────────
  #  VPC + Networking
  # ─────────────────────────────────────────────────────────────────────────────

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/24
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-vpc"
        - Key: Project
          Value: AsahiRoute

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-igw"

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.0.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-public-subnet"

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-public-rt"

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # ─────────────────────────────────────────────────────────────────────────────
  #  Security Group
  # ─────────────────────────────────────────────────────────────────────────────

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: AsahiRoute EC2 - SSH + HTTP/S + WebSocket
      VpcId: !Ref VPC
      SecurityGroupIngress:
        # SSH — restricted to your IP
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SSHAllowedIP
          Description: SSH access (your IP only)
        # HTTP
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP (redirect to HTTPS)
        # HTTPS
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS (API + WebSocket)
        # WebSocket (Soketi direct — fallback if not proxied via nginx)
        - IpProtocol: tcp
          FromPort: 6001
          ToPort: 6001
          CidrIp: 0.0.0.0/0
          Description: WebSocket (Soketi)
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
          Description: All outbound traffic
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-sg"

  # ─────────────────────────────────────────────────────────────────────────────
  #  IAM Role for EC2 (S3, CloudWatch, SSM)
  # ─────────────────────────────────────────────────────────────────────────────

  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-ec2-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # SSM for remote management (no SSH needed from console)
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        # CloudWatch agent
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: AsahiS3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Read/Write to storage bucket
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt StorageBucket.Arn
                  - !Sub "${StorageBucket.Arn}/*"
              # Read-only to frontend bucket (for deployment verification)
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt FrontendBucket.Arn
                  - !Sub "${FrontendBucket.Arn}/*"
        - PolicyName: AsahiSSMSecrets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/asahi/prod/*"
      Tags:
        - Key: Project
          Value: AsahiRoute

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  # ─────────────────────────────────────────────────────────────────────────────
  #  EC2 Instance (t4g.micro ARM Graviton2 + Docker Compose)
  # ─────────────────────────────────────────────────────────────────────────────

  EC2Instance:
    Type: AWS::EC2::Instance
    DependsOn: VPCGatewayAttachment
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref LatestAmiId
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref EC2InstanceProfile
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeType: gp3
            VolumeSize: !Ref EBSVolumeSize
            Iops: 3000       # gp3 baseline (free)
            Encrypted: true
            DeleteOnTermination: false  # preserve data on stack delete
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          exec > >(tee /var/log/user-data.log) 2>&1

          # ── 1/11  cfn-bootstrap ────────────────────────────────────────
          echo "=== [1/11] Install cfn-bootstrap ==="
          dnf install -y aws-cfn-bootstrap

          # ── 2/11  System update ────────────────────────────────────────
          echo "=== [2/11] System update ==="
          dnf update -y

          # ── 3/11  Docker + Git + OpenSSL + Certbot ─────────────────────
          echo "=== [3/11] Install Docker, Git, OpenSSL, Certbot ==="
          dnf install -y docker git openssl certbot
          systemctl enable --now docker
          usermod -aG docker ec2-user

          # ── 4/11  Docker Compose v2 plugin (ARM64 / Graviton) ──────────
          echo "=== [4/11] Docker Compose v2 plugin (ARM64) ==="
          DCVER=$(curl -fsSL https://api.github.com/repos/docker/compose/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4)
          mkdir -p /usr/local/lib/docker/cli-plugins
          curl -fsSL \
            "https://github.com/docker/compose/releases/download/$DCVER/docker-compose-linux-aarch64" \
            -o /usr/local/lib/docker/cli-plugins/docker-compose
          chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
          docker compose version

          # ── 5/11  Swap (1 GB) ──────────────────────────────────────────
          echo "=== [5/11] Setup swap ==="
          if [ ! -f /swapfile ]; then
            dd if=/dev/zero of=/swapfile bs=128M count=8
            chmod 600 /swapfile
            mkswap /swapfile
            swapon /swapfile
            echo '/swapfile swap swap defaults 0 0' >> /etc/fstab
          fi

          # ── 6/11  Clone repository ─────────────────────────────────────
          echo "=== [6/11] Clone ${GitRepoURL} ==="
          APP_DIR=/opt/asahi
          git clone ${GitRepoURL} $APP_DIR
          chown -R ec2-user:ec2-user $APP_DIR

          # ── 7/11  Fetch secrets from SSM ───────────────────────────────
          echo "=== [7/11] Fetch secrets from SSM ==="
          REGION=${AWS::Region}
          DOMAIN=${DomainName}

          ssm_get() {
            aws ssm get-parameter \
              --name "$1" --with-decryption \
              --query Parameter.Value --output text \
              --region $REGION 2>/dev/null
          }

          APP_KEY_V=$(ssm_get /asahi/prod/APP_KEY)
          DB_HOST_V=$(ssm_get /asahi/prod/DB_HOST)
          DB_PORT_V=$(ssm_get /asahi/prod/DB_PORT)
          DB_USER_V=$(ssm_get /asahi/prod/DB_USERNAME)
          DB_PASS_V=$(ssm_get /asahi/prod/DB_PASSWORD)
          PUSH_ID_V=$(ssm_get /asahi/prod/PUSHER_APP_ID)
          PUSH_KEY_V=$(ssm_get /asahi/prod/PUSHER_APP_KEY)
          PUSH_SEC_V=$(ssm_get /asahi/prod/PUSHER_APP_SECRET)

          # ── 8/11  Write .env (echo per-line, no heredoc) ──────────────
          echo "=== [8/11] Write production .env ==="
          mkdir -p $APP_DIR/docker/nginx/ssl
          echo 'APP_NAME=AsahiRoute'                    > $APP_DIR/.env
          echo 'APP_ENV=production'                    >> $APP_DIR/.env
          echo 'APP_KEY=__APP_KEY__'                   >> $APP_DIR/.env
          echo 'APP_DEBUG=false'                       >> $APP_DIR/.env
          echo 'APP_TIMEZONE=Asia/Tokyo'               >> $APP_DIR/.env
          echo 'APP_URL=https://api.__DOMAIN__'        >> $APP_DIR/.env
          echo 'APP_LOCALE=ja'                         >> $APP_DIR/.env
          echo 'APP_FALLBACK_LOCALE=en'                >> $APP_DIR/.env
          echo 'APP_FAKER_LOCALE=ja_JP'                >> $APP_DIR/.env
          echo 'APP_MAINTENANCE_DRIVER=file'           >> $APP_DIR/.env
          echo 'PHP_CLI_SERVER_WORKERS=4'              >> $APP_DIR/.env
          echo 'BCRYPT_ROUNDS=12'                      >> $APP_DIR/.env
          echo 'LOG_CHANNEL=stack'                     >> $APP_DIR/.env
          echo 'LOG_STACK=single'                      >> $APP_DIR/.env
          echo 'LOG_DEPRECATIONS_CHANNEL=null'         >> $APP_DIR/.env
          echo 'LOG_LEVEL=info'                        >> $APP_DIR/.env
          echo 'DB_CONNECTION=pgsql'                  >> $APP_DIR/.env
          echo 'DB_HOST=__DB_HOST__'                   >> $APP_DIR/.env
          echo 'DB_PORT=__DB_PORT__'                   >> $APP_DIR/.env
          echo 'DB_DATABASE=postgres'                  >> $APP_DIR/.env
          echo 'DB_USERNAME=__DB_USER__'               >> $APP_DIR/.env
          echo 'DB_PASSWORD=__DB_PASS__'               >> $APP_DIR/.env
          echo 'SESSION_DRIVER=redis'                  >> $APP_DIR/.env
          echo 'SESSION_LIFETIME=120'                  >> $APP_DIR/.env
          echo 'SESSION_ENCRYPT=false'                 >> $APP_DIR/.env
          echo 'SESSION_PATH=/'                        >> $APP_DIR/.env
          echo 'SESSION_DOMAIN=null'                   >> $APP_DIR/.env
          echo 'FILESYSTEM_DISK=local'                 >> $APP_DIR/.env
          echo 'QUEUE_CONNECTION=redis'                >> $APP_DIR/.env
          echo 'CACHE_STORE=redis'                     >> $APP_DIR/.env
          echo 'CACHE_PREFIX='                         >> $APP_DIR/.env
          echo 'REDIS_CLIENT=phpredis'                 >> $APP_DIR/.env
          echo 'REDIS_HOST=redis'                      >> $APP_DIR/.env
          echo 'REDIS_PASSWORD=null'                   >> $APP_DIR/.env
          echo 'REDIS_PORT=6379'                       >> $APP_DIR/.env
          echo 'MAIL_MAILER=log'                       >> $APP_DIR/.env
          echo 'MAIL_SCHEME=null'                      >> $APP_DIR/.env
          echo 'MAIL_HOST=127.0.0.1'                   >> $APP_DIR/.env
          echo 'MAIL_PORT=2525'                        >> $APP_DIR/.env
          echo 'MAIL_USERNAME=null'                    >> $APP_DIR/.env
          echo 'MAIL_PASSWORD=null'                    >> $APP_DIR/.env
          echo 'MAIL_FROM_ADDRESS=hello@__DOMAIN__'    >> $APP_DIR/.env
          echo 'MAIL_FROM_NAME=AsahiRoute'             >> $APP_DIR/.env
          echo 'BROADCAST_CONNECTION=pusher'           >> $APP_DIR/.env
          echo 'PUSHER_APP_ID=__PUSH_ID__'             >> $APP_DIR/.env
          echo 'PUSHER_APP_KEY=__PUSH_KEY__'           >> $APP_DIR/.env
          echo 'PUSHER_APP_SECRET=__PUSH_SEC__'        >> $APP_DIR/.env
          echo 'PUSHER_HOST=soketi'                    >> $APP_DIR/.env
          echo 'PUSHER_PORT=6001'                      >> $APP_DIR/.env
          echo 'PUSHER_SCHEME=http'                    >> $APP_DIR/.env
          echo 'PUSHER_APP_CLUSTER=mt1'                >> $APP_DIR/.env
          echo 'VITE_APP_NAME=AsahiRoute'              >> $APP_DIR/.env
          echo 'VITE_PUSHER_APP_KEY=__PUSH_KEY__'      >> $APP_DIR/.env
          echo 'VITE_PUSHER_HOST=ws.__DOMAIN__'        >> $APP_DIR/.env
          echo 'VITE_PUSHER_PORT=443'                  >> $APP_DIR/.env
          echo 'VITE_PUSHER_SCHEME=https'              >> $APP_DIR/.env
          echo 'VITE_PUSHER_APP_CLUSTER=mt1'           >> $APP_DIR/.env
          echo 'OPTIMIZER_URL=http://optimizer:8000'   >> $APP_DIR/.env
          echo 'SSL_CERT_PATH=/opt/asahi/docker/nginx/ssl' >> $APP_DIR/.env
          echo 'FRONTEND_URL=https://app.__DOMAIN__'   >> $APP_DIR/.env

          sed -i "s|__APP_KEY__|$APP_KEY_V|g"  $APP_DIR/.env
          sed -i "s|__DOMAIN__|$DOMAIN|g"      $APP_DIR/.env
          sed -i "s|__DB_HOST__|$DB_HOST_V|g"  $APP_DIR/.env
          sed -i "s|__DB_PORT__|$DB_PORT_V|g"  $APP_DIR/.env
          sed -i "s|__DB_USER__|$DB_USER_V|g"  $APP_DIR/.env
          sed -i "s|__DB_PASS__|$DB_PASS_V|g"  $APP_DIR/.env
          sed -i "s|__PUSH_ID__|$PUSH_ID_V|g"  $APP_DIR/.env
          sed -i "s|__PUSH_KEY__|$PUSH_KEY_V|g" $APP_DIR/.env
          sed -i "s|__PUSH_SEC__|$PUSH_SEC_V|g" $APP_DIR/.env
          chmod 600 $APP_DIR/.env
          chown ec2-user:ec2-user $APP_DIR/.env

          # ── 9/11  Self-signed cert (placeholder until Let's Encrypt) ───
          echo "=== [9/11] Generate self-signed TLS cert (placeholder) ==="
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout $APP_DIR/docker/nginx/ssl/privkey.pem \
            -out    $APP_DIR/docker/nginx/ssl/fullchain.pem \
            -subj "/C=JP/ST=Osaka/O=AsahiRoute/CN=api.$DOMAIN"

          # ── 10/11  Docker Compose up ────────────────────────────────────
          echo "=== [10/11] docker compose up ==="
          cd $APP_DIR
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

          echo "  Waiting 40s for services to initialize..."
          sleep 40

          echo "  Running DB migrations..."
          docker compose exec -T app php artisan migrate --force || \
            echo "  WARNING: migration failed — run manually after deploy"

          docker compose exec -T app php artisan storage:link || true

          # ── 11/11  SSL setup script (echo per-line, no heredoc) ──────────
          echo "=== [11/11] Install SSL helper script ==="
          SSL=/usr/local/bin/asahi-ssl-setup.sh
          echo '#!/bin/bash'                                                               > $SSL
          echo 'set -e'                                                                   >> $SSL
          echo 'APP_DIR=/opt/asahi'                                                       >> $SSL
          echo 'DOMAIN=$(grep "^APP_URL=" $APP_DIR/.env | sed "s|.*https://api\.||")'   >> $SSL
          echo 'EMAIL=admin@$DOMAIN'                                                      >> $SSL
          echo 'echo "[SSL] Getting Let'\''s Encrypt cert for $DOMAIN"'                  >> $SSL
          echo 'docker compose -f $APP_DIR/docker-compose.yml -f $APP_DIR/docker-compose.prod.yml stop nginx' >> $SSL
          echo 'certbot certonly --standalone --non-interactive --agree-tos \'            >> $SSL
          echo '  --email $EMAIL -d api.$DOMAIN -d ws.$DOMAIN'                           >> $SSL
          echo 'cp /etc/letsencrypt/live/api.$DOMAIN/fullchain.pem $APP_DIR/docker/nginx/ssl/' >> $SSL
          echo 'cp /etc/letsencrypt/live/api.$DOMAIN/privkey.pem   $APP_DIR/docker/nginx/ssl/' >> $SSL
          echo 'docker compose -f $APP_DIR/docker-compose.yml -f $APP_DIR/docker-compose.prod.yml up -d nginx' >> $SSL
          echo 'echo "0 3 * * * root certbot renew --quiet --deploy-hook '\''cp /etc/letsencrypt/live/api.$DOMAIN/fullchain.pem $APP_DIR/docker/nginx/ssl/ && cp /etc/letsencrypt/live/api.$DOMAIN/privkey.pem $APP_DIR/docker/nginx/ssl/ && docker compose -f $APP_DIR/docker-compose.yml -f $APP_DIR/docker-compose.prod.yml up -d nginx'\''" > /etc/cron.d/asahi-certbot' >> $SSL
          echo 'echo "[SSL] Done! Test: https://api.$DOMAIN"'                            >> $SSL
          chmod +x /usr/local/bin/asahi-ssl-setup.sh

          echo "=== All steps complete. Sending cfn-signal ==="
          /opt/aws/bin/cfn-signal -e $? \
            --stack ${AWS::StackName} \
            --resource EC2Instance \
            --region ${AWS::Region}
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-ec2"
        - Key: Project
          Value: AsahiRoute
        - Key: Environment
          Value: !Ref Environment
    CreationPolicy:
      ResourceSignal:
        Timeout: PT30M

  # ─────────────────────────────────────────────────────────────────────────────
  #  Elastic IP
  # ─────────────────────────────────────────────────────────────────────────────

  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-eip"

  EIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref EC2Instance
      AllocationId: !GetAtt ElasticIP.AllocationId

  # ─────────────────────────────────────────────────────────────────────────────
  #  S3 Buckets
  # ─────────────────────────────────────────────────────────────────────────────

  # Frontend SPA bucket (React PWA build artifacts)
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ["*"]
            AllowedMethods: [GET]
            AllowedHeaders: ["*"]
            MaxAge: 86400
      LifecycleConfiguration:
        Rules:
          - Id: CleanupOldVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 7
      Tags:
        - Key: Project
          Value: AsahiRoute
        - Key: Purpose
          Value: frontend-spa

  # Frontend bucket policy for CloudFront OAC
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  # Storage bucket (photos, PDFs, exports)
  StorageBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          # Move backups to Glacier after 30 days
          - Id: BackupToGlacier
            Status: Enabled
            Prefix: backup/
            Transitions:
              - StorageClass: GLACIER
                TransitionInDays: 30
            ExpirationInDays: 90
          # Delete temp exports after 7 days
          - Id: CleanupExports
            Status: Enabled
            Prefix: exports/
            ExpirationInDays: 7
      Tags:
        - Key: Project
          Value: AsahiRoute
        - Key: Purpose
          Value: storage-backup

  # ─────────────────────────────────────────────────────────────────────────────
  #  CloudFront Distribution (SPA CDN)
  # ─────────────────────────────────────────────────────────────────────────────

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "AsahiRoute SPA — ${DomainName}"
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_200  # Asia + US + Europe (cheapest with Japan)
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          ResponseHeadersPolicyId: 67f7725c-6f97-4210-82d7-5512b31e9d03  # SecurityHeaders
        CacheBehaviors:
          # index.html, sw.js, manifest — no cache
          - PathPattern: "index.html"
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD]
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
          - PathPattern: "sw.js"
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD]
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          - PathPattern: "manifest.webmanifest"
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD]
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
        # SPA routing: return index.html for 403/404 (React Router)
        CustomErrorResponses:
          - ErrorCode: 403
            ResponsePagePath: /index.html
            ResponseCode: 200
            ErrorCachingMinTTL: 10
          - ErrorCode: 404
            ResponsePagePath: /index.html
            ResponseCode: 200
            ErrorCachingMinTTL: 10
      Tags:
        - Key: Project
          Value: AsahiRoute

  # ─────────────────────────────────────────────────────────────────────────────
  #  Route 53 Hosted Zone + Records
  # ─────────────────────────────────────────────────────────────────────────────

  HostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: !Ref DomainName
      HostedZoneConfig:
        Comment: !Sub "AsahiRoute — ${DomainName}"

  # API subdomain → EC2 Elastic IP
  APIRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZone
      Name: !Sub "api.${DomainName}"
      Type: A
      TTL: 300
      ResourceRecords:
        - !Ref ElasticIP

  # WebSocket subdomain → EC2 Elastic IP
  WSRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZone
      Name: !Sub "ws.${DomainName}"
      Type: A
      TTL: 300
      ResourceRecords:
        - !Ref ElasticIP

  # App subdomain → CloudFront
  AppRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZone
      Name: !Sub "app.${DomainName}"
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront global hosted zone ID
        EvaluateTargetHealth: false

  # ─────────────────────────────────────────────────────────────────────────────
  #  EBS Snapshot Lifecycle (Daily backup, 7-day retention)
  # ─────────────────────────────────────────────────────────────────────────────

  DLMRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-dlm-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: dlm.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSDataLifecycleManagerServiceRole

  SnapshotLifecyclePolicy:
    Type: AWS::DLM::LifecyclePolicy
    Properties:
      Description: Daily EBS snapshot for AsahiRoute EC2
      State: ENABLED
      ExecutionRoleArn: !GetAtt DLMRole.Arn
      PolicyDetails:
        PolicyType: EBS_SNAPSHOT_MANAGEMENT
        ResourceTypes:
          - INSTANCE
        TargetTags:
          - Key: Name
            Value: !Sub "${AWS::StackName}-ec2"
        Schedules:
          - Name: DailySnapshot
            CreateRule:
              Interval: 24
              IntervalUnit: HOURS
              Times:
                - "18:00"  # 03:00 AM JST
            RetainRule:
              Count: 7
            CopyTags: true
      Tags:
        - Key: Project
          Value: AsahiRoute

  # ─────────────────────────────────────────────────────────────────────────────
  #  CloudWatch Alarms
  # ─────────────────────────────────────────────────────────────────────────────

  CPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-cpu-high"
      AlarmDescription: >-
        EC2 CPU > 80% for 10 minutes — consider upgrading to t4g.small.
      Namespace: AWS/EC2
      MetricName: CPUUtilization
      Dimensions:
        - Name: InstanceId
          Value: !Ref EC2Instance
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: breaching

  StatusCheckAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-status-check"
      AlarmDescription: EC2 system status check failed — auto-recovering instance.
      Namespace: AWS/EC2
      MetricName: StatusCheckFailed_System
      Dimensions:
        - Name: InstanceId
          Value: !Ref EC2Instance
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 2
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: breaching
      # Auto-recover instance on hardware failure
      AlarmActions:
        - !Sub "arn:aws:automate:${AWS::Region}:ec2:recover"

# ═══════════════════════════════════════════════════════════════════════════════
#  Outputs
# ═══════════════════════════════════════════════════════════════════════════════

Outputs:
  ElasticIPAddress:
    Description: EC2 Elastic IP (use for Route 53 A records)
    Value: !Ref ElasticIP
    Export:
      Name: !Sub "${AWS::StackName}-eip"

  EC2InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance

  CloudFrontDomainName:
    Description: CloudFront distribution domain (for app subdomain CNAME)
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub "${AWS::StackName}-cf-domain"

  CloudFrontDistributionId:
    Description: CloudFront distribution ID (for cache invalidation)
    Value: !Ref CloudFrontDistribution

  FrontendBucketName:
    Description: S3 bucket for frontend SPA (npm run build → s3 sync here)
    Value: !Ref FrontendBucket
    Export:
      Name: !Sub "${AWS::StackName}-frontend-bucket"

  StorageBucketName:
    Description: S3 bucket for storage + backups
    Value: !Ref StorageBucket
    Export:
      Name: !Sub "${AWS::StackName}-storage-bucket"

  HostedZoneId:
    Description: Route 53 Hosted Zone ID (update NS records at your registrar)
    Value: !Ref HostedZone

  HostedZoneNameServers:
    Description: NS records — configure these at your domain registrar
    Value: !Join [", ", !GetAtt HostedZone.NameServers]

  SSHCommand:
    Description: SSH command to connect to EC2
    Value: !Sub "ssh -i ${KeyPairName}.pem ec2-user@${ElasticIP}"

  DeployCommand:
    Description: Quick deploy command (run on EC2)
    Value: !Sub |
      cd /opt/asahi && git pull origin main && \
      docker compose -f docker-compose.yml -f docker-compose.prod.yml build && \
      docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

  S3SyncCommand:
    Description: Deploy frontend to S3 + invalidate CloudFront
    Value: !Sub |
      aws s3 sync frontend/dist/ s3://${FrontendBucket} --delete \
        --exclude "index.html" --exclude "sw.js" --exclude "manifest.webmanifest" \
        --cache-control "max-age=31536000,immutable" && \
      aws s3 cp frontend/dist/index.html s3://${FrontendBucket}/index.html \
        --cache-control "no-cache" && \
      aws s3 cp frontend/dist/sw.js s3://${FrontendBucket}/sw.js \
        --cache-control "no-cache" && \
      aws cloudfront create-invalidation \
        --distribution-id ${CloudFrontDistribution} --paths "/*"

  MonthlyCostEstimate:
    Description: Estimated monthly cost breakdown (on-demand)
    Value: !Sub |
      EC2 ${InstanceType}: $7.92 (on-demand) | $4.38 (1yr RI)
      EBS gp3 ${EBSVolumeSize}GB: $${EBSVolumeSize} * 0.077 = est
      S3 ~10GB: ~$0.60
      CloudFront ~5GB: ~$0.70
      Route 53: $0.50
      Data Transfer: ~$0.60
      Total (on-demand AWS): ~$10.32/mo | Total (RI): ~$6.78/mo  (+ Supabase costs)
