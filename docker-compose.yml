services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: asahi-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - asahi-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.25-alpine
    container_name: asahi-nginx
    restart: unless-stopped
    ports:
      - "2009:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - asahi-network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: asahi-mysql
    restart: unless-stopped
    ports:
      - "23306:3306"
    environment:
      MYSQL_DATABASE: asahi_route
      MYSQL_USER: asahi_user
      MYSQL_PASSWORD: asahi_secret
      MYSQL_ROOT_PASSWORD: root_secret
    volumes:
      - asahi-mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - asahi-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: asahi-redis
    restart: unless-stopped
    ports:
      - "26379:6379"
    networks:
      - asahi-network

  soketi:
    image: quay.io/soketi/soketi:latest-16-alpine
    container_name: asahi-soketi
    restart: unless-stopped
    ports:
      - "6001:6001"   # WebSocket
      - "9601:9601"   # Metrics
    environment:
      SOKETI_DEBUG: "1"
      SOKETI_DEFAULT_APP_ID: "asahi-app"
      SOKETI_DEFAULT_APP_KEY: "asahi-key"
      SOKETI_DEFAULT_APP_SECRET: "asahi-secret"
    networks:
      - asahi-network

networks:
  asahi-network:
    driver: bridge

volumes:
  asahi-mysql-data:
